<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PureViolet</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0F061A;
      color: #F7F1FF;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 20px;
    }

    .logo {
      width: 80%;
      max-width: 450px;
      margin-bottom: 30px;
      box-shadow: 0 0 40px rgba(181,140,255,0.4);
      border-radius: 20px;
    }

    h1 {
      font-size: 3rem;
      color: #B58CFF;
      margin-bottom: 15px;
      font-family: Georgia, serif;
    }

    p {
      color: #CDBBEA;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .button {
      padding: 14px 30px;
      border-radius: 40px;
      background: linear-gradient(135deg, #6E3BB8, #B58CFF);
      color: white;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 25px rgba(181,140,255,0.5);
    }

    .button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="pureviolet-logo.jpg" class="logo">

    <h1>PureViolet</h1>

    <p>
      Refined indulgence. Unforgettable connection.<br><br>
      A private world of elegance, softness, and presence — created for those
      who value chemistry, discretion, and something deeper than the ordinary.
    </p>

    <a href="world.html" class="button">Enter My World</a>
  </div>

</body>
</html>
