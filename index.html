<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Indulgence</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(to bottom, #000, #111);
}

h1 {
    font-size: 50px;
    color: #d4af37;
    letter-spacing: 2px;
}

p.tagline {
    font-size: 18px;
    opacity: 0.8;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: #151515;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
    color: #d4af37;
}

.card p {
    margin: 0 10px 10px;
    opacity: 0.8;
}

footer {
    text-align: center;
    padding: 30px;
    background: #111;
    font-size: 14px;
    opacity: 0.6;
}
</style>
</head>

<body>

<header>
    <h1>Private Indulgence</h1>
    <p class="tagline">Discretion. Elegance. Indulgence.</p>
</header>

<div class="container">
    <h2>Our Companions</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300x400">
            <h3>Priya</h3>
            <p>Elegant & captivating</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x400">
            <h3>Violet</h3>
            <p>Soft & playful</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x400">
            <h3>Scarlett</h3>
            <p>Bold & unforgettable</p>
        </div>

    </div>
</div>

<footer>
    © Private Indulgence
</footer>

</body>
</html>
